# Checklist v2 — Catálogo estructurado maestro
#
# Este archivo es consumible por el agente de code review.
# Contiene el listado completo de controles con su metadata.
#
# Campos:
#   id          — identificador estable del control
#   title       — título legible
#   severity    — critical | high | medium | low | info
#   applies_to  — lista de áreas: backend, frontend, api, infra, data, ai, all, etc.
#   tags        — etiquetas auxiliares (estándares, CWE, OWASP, etc.)
#   file        — ruta relativa al archivo markdown que contiene el control
#   section     — sección dentro del archivo ("A", "B", ...) — orientativo
#
# Convención de IDs: <CATEGORIA>-<SUBCAT>-<NNN>, estables, no se renumeran.

version: "2.0.0"
schema_version: 1
last_updated: "2026-04-23"

# ---------------------------------------------------------------------------
categories:
  - id: security
    prefix: [SEC]
    name: Seguridad
    folder: 01-seguridad
  - id: api
    prefix: [API]
    name: API REST
    folder: 02-api-diseno
  - id: code_quality
    prefix: [CODE]
    name: Calidad de código
    folder: 03-calidad-codigo
  - id: testing
    prefix: [TEST]
    name: Testing
    folder: 04-testing
  - id: performance
    prefix: [PERF]
    name: Rendimiento
    folder: 05-rendimiento
  - id: data_privacy
    prefix: [DATA]
    name: Protección de datos
    folder: 06-proteccion-datos
  - id: ai_llm
    prefix: [LLM]
    name: IA / LLM
    folder: 07-ia-llm
  - id: usability
    prefix: [UX]
    name: Usabilidad
    folder: 08-usabilidad-ux
  - id: accessibility
    prefix: [A11Y]
    name: Accesibilidad
    folder: 09-accesibilidad
  - id: observability
    prefix: [OBS]
    name: Observabilidad
    folder: 10-observabilidad
  - id: cicd_devops
    prefix: [CICD]
    name: CI/CD y DevOps
    folder: 11-cicd-devops
  - id: architecture
    prefix: [ARCH]
    name: Arquitectura
    folder: 12-arquitectura
  - id: database
    prefix: [DB]
    name: Base de datos
    folder: 13-base-datos
  - id: documentation
    prefix: [DOC]
    name: Documentación
    folder: 14-documentacion

# ---------------------------------------------------------------------------
severities:
  critical:
    description: "Riesgo de brecha, pérdida de datos o vulnerabilidad explotable. Bloquea merge."
    agent_action: block_merge
  high:
    description: "Bug funcional serio o riesgo importante. Exige cambios antes de merge."
    agent_action: request_changes
  medium:
    description: "Mejora importante sin riesgo inmediato. Comentario fuerte."
    agent_action: comment_strong
  low:
    description: "Mejora de estilo o consistencia."
    agent_action: comment_nit
  info:
    description: "Buenas prácticas, no obligatorio."
    agent_action: comment_info

